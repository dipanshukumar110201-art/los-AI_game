<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA: Open World</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="loading">
        <h1>LA OPEN WORLD</h1>
        <div class="sub">LOS SANTOS REIMAGINED</div>
        <div class="bar"><div class="bar-fill" id="load-bar"></div></div>
        <div class="tip" id="load-tip">Initializing world...</div>
    </div>

    <div id="hud">
        <div id="wanted"></div>
        <div id="money">$5,000</div>
        <div id="time-display">12:00</div>
        
        <div id="health-wrap">
            <div class="bar-label">Stamina</div>
            <div class="bar-track"><div class="bar-fill" id="stamina-fill"></div></div>
            <div class="bar-label">Armor</div>
            <div class="bar-track"><div class="bar-fill" id="armor-fill"></div></div>
            <div class="bar-label">Health</div>
            <div class="bar-track"><div class="bar-fill" id="health-fill"></div></div>
        </div>

        <div id="minimap-wrap"><canvas id="minimap" width="150" height="150"></canvas></div>
        
        <div id="speed-display">
            <div id="speed-num">0</div>
            <div id="speed-unit">MPH</div>
        </div>

        <div id="radio-box">
            <div class="st" id="radio-station"></div>
            <div class="sn" id="radio-song"></div>
        </div>

        <div id="zone-name"></div>
        
        <div id="controls-help">
            <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move</span>
            <span><kbd>Shift</kbd> Sprint</span>
            <span><kbd>F</kbd> Vehicle</span>
            <span><kbd>Space</kbd> Jump/Brake</span>
            <span><kbd>R</kbd> Radio</span>
            <span><kbd>Click</kbd> Lock Mouse</span>
        </div>
        
        <div id="notif"></div>
    </div>

    <div id="crosshair"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
